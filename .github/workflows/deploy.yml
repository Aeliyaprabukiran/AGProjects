name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: './multi-tool-dashboard/package-lock.json'

      - name: Install dependencies
        working-directory: ./multi-tool-dashboard
        run: npm ci

      - name: Build
        working-directory: ./multi-tool-dashboard
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          publish_dir: ./multi-tool-dashboard/dist
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
